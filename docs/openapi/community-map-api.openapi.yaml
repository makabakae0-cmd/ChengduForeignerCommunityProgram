openapi: 3.1.0
info:
  title: Chengdu Tongzilin Community Map API
  version: 0.1.0
  description: |
    Community Map API for mobile, Mini Program, Admin, and Postman debugging.

    Current status:
    - Local Koa HTTP routes and shared contracts are implemented for the listed endpoints.
    - CloudBase dev URL is documented for deployment target only; `/api` route and live acceptance still require verification.
    - `x-mock-user-id` is a local/dev actor header and is not a production authentication scheme.
servers:
  - url: http://127.0.0.1:8787
    description: local Koa dev server
  - url: https://cloud1-d7gxdk8t43bd639c0.service.tcloudbase.com/api
    description: CloudBase dev HTTP access service, pending `/api` route verification
tags:
  - name: System
  - name: Auth
  - name: Events
  - name: Discover
  - name: Places
  - name: Announcements
  - name: Notifications
  - name: Files
  - name: Admin
components:
  securitySchemes:
    MockActorHeader:
      type: apiKey
      in: header
      name: x-mock-user-id
      description: Local/dev mock actor id, for example `user_001` for admin flows.
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 10
    CommunityId:
      name: communityId
      in: query
      schema:
        type: string
        default: tongzilin
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          examples:
            [
              VALIDATION_ERROR,
              UNAUTHORIZED,
              FORBIDDEN,
              NOT_FOUND,
              INTERNAL_ERROR
            ]
        message:
          type: string
        details: {}
    ApiFailure:
      type: object
      required: [success, error, requestId]
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: "#/components/schemas/ApiError"
        requestId:
          type: string
    SuccessEnvelope:
      type: object
      required: [success, data, requestId]
      properties:
        success:
          type: boolean
          const: true
        data: {}
        requestId:
          type: string
    Coordinates:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          example: 30.615
        longitude:
          type: number
          example: 104.062
    User:
      type: object
      required:
        [_id, nickname, avatar_url, preferred_language, role_flags, status]
      properties:
        _id:
          type: string
        openid:
          type: string
        unionid:
          type: string
        nickname:
          type: string
        avatar_url:
          type: string
          format: uri
        phone:
          type: string
        preferred_language:
          type: string
          enum: [zh, en]
        role_flags:
          type: array
          items:
            type: string
            examples: [community_admin, system_admin]
        status:
          type: string
    AuthSession:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
    Event:
      type: object
      required:
        - _id
        - community_id
        - title_zh
        - title_en
        - summary_zh
        - summary_en
        - content_zh
        - content_en
        - cover_file_id
        - cover_cloud_path
        - cover_url
        - address_text
        - location
        - start_time
        - end_time
        - signup_deadline
        - capacity
        - organizer_user_id
        - review_status
        - publish_status
      properties:
        _id:
          type: string
        community_id:
          type: string
        title_zh:
          type: string
        title_en:
          type: string
        summary_zh:
          type: string
        summary_en:
          type: string
        content_zh:
          type: string
        content_en:
          type: string
        cover_file_id:
          type: string
        cover_cloud_path:
          type: string
        cover_url:
          type: string
          format: uri
        place_id:
          type: string
        address_text:
          type: string
        location:
          $ref: "#/components/schemas/Coordinates"
        start_time:
          type: string
        end_time:
          type: string
        signup_deadline:
          type: string
        capacity:
          type: integer
          minimum: 1
        organizer_user_id:
          type: string
        review_status:
          type: string
          enum: [pending_review, approved, rejected]
        publish_status:
          type: string
          enum: [draft, published, offline]
    CreateEventInput:
      type: object
      required:
        - title_zh
        - title_en
        - summary_zh
        - summary_en
        - content_zh
        - content_en
        - address_text
        - location
